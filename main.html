<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <!-- DaisyUI-and-css-add-links -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 h-screen w-full ">

    <!-- NAVBAR -->

    <nav class="flex justify-between items-center bg-white p-4 shadow mx-auto px-16">

        <div class="flex justify-between items-center gap-2">
            <img class="w-[50px] h-[50px]" src="./assets/github-logo.png" alt="GitHub Logo">
            <h3 class="font-bold">GitHub Issues Tracker</h3>
        </div>

        <div class="flex justify-between items-center gap-4">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search" />
            </label>
            <button class="btn btn-primary">+ New Issue</button>
        </div>
    </nav>

    <!-- TAB-SECTION -->
    <div class="flex  justify-start items-center gap-4 mt-6 mx-46  bg-white p-4 shadow ">
        <button onclick="switchTab('all')" id="all-btn" class=" px-6 py-2 btn btn-primary">All </button>
        <button onclick="switchTab('open')" id="open-btn" class=" px-6 py-2 btn">Open </button>
        <button onclick="switchTab('closed')" id="closed-btn" class=" px-6 py-2 btn">Closed</button>
    </div>
    <!-- TAB'S-BELOW-SECTION -->
    <div class="flex  justify-between items-center gap-4 mt-6 mx-46  bg-white p-4 shadow ">
        <div class="flex justify-start items-center gap-2">
            <div>
                <img src="./assets/Aperture.png" alt="">

            </div>
            <div>
                <h1 class="font-bold">50 Issues</h1>
                <p class="text-gray-600">Track and manage your project issues</p>

            </div>

        </div>
        <div class="flex justify-end items-center gap-2">
            <button class="w-3 h-3 bg-green-600 rounded-full"></button>
            <p>Open</p>
            <button class="w-3 h-3 bg-blue-700 rounded-full"></button>
            <p>Closed</p>

        </div>
    </div>
    <!-- CARD-SECTION -->
    <div id="cards-container"
        class="mx-46 mt-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4  bg-white p-4 shadow space-y-4">
        <!-- Cards will be dynamically added here -->
        <div class="bg-white p-4 shadow w-[256px] h-[273px] border-t-4 border-green-500 rounded">
            <div class="flex justify-between items-center gap-2">
                <img src="./assets/Open-Status.png" alt="">
                <button class="btn btn-active rounded-3xl h-7"> <span
                        class="text-xs text-yellow-600 font-bold">HIGH</span></button>
            </div>

            <h1 class="font-bold text-lg mt-2">Fix Navigation Menu on Mobile Devices</h1>
            <p class="text-gray-600 mt-1 line-clamp-2">The navigation menu doesn't collapse properly on mobile
                devices</p>

            <div class="mt-1 justify-between items-center gap-0 flex">
                <button
                    class="flex items-center gap-2 btn btn-active rounded-3xl h-7 text-yellow-700 px-4 py-2 rounded text-xs">

                    <img src="./assets/BugDroid.png" class="w-4 h-4">

                    BUG

                </button>

                <button
                    class="flex items-center gap-2 btn btn-active bg-amber-100 text-yellow-700 rounded-3xl h-7 px-3 py-2 rounded text-xs">

                    <img src="./assets/Vector.png" class="w-4 h-4">

                    HELP WANTED

                </button>



            </div>
            <hr class="border-t border-gray-300 my-2">
            <p class="text-gray-600 line-clamp-2">#1
                by john_doe</p>
            <p class="text-gray-600 line-clamp-2">1/15/2024</p>


        </div>


    </div>


    <script src="./script.js"></script>
</body>

</html>
