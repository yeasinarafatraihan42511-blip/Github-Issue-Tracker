<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>

    <!-- DaisyUI-and-css-add-links -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
    <!-- Login-page-design -->
    <form id="login-form">
        <div
            class="flex items-center justify-center h-screen bg-gray-100 w-full h-[900px] shadow-2xl  space-x-0 space-y-0 flex  flex-col gap-8px  ">
            <div class="w-full max-w-md  bg-white rounded shadow x-[540px] y-[78.5px] w-[520px] h-[643px] gap-0px pt-6">
                <div class="flex flex-col justify-center items-center">
                    <img class="w-[100px] h-[100px] " src="./assets/github-logo.png" alt="">
                    <h3 class="text-2xl font-bold text-center">GitHub Issues <br>Tracker</h3>
                    <p class="text-center text-gray-600">Sign in to manage your issues</p>
                </div>
                <div class=" flex flex-col justify-center items-center y-6">
                    <fieldset class="fieldset bg-white border-base-300 rounded-box w-xs border p-2 ">
                        <legend class="fieldset-legend">Login</legend>

                        <label class="label font-bold">Username</label>
                       <input type="text" id="username" class="input" placeholder=" Enter Username" />
                        <p class="text-indigo-600 font-bold">Default: admin</p>

                        <label class="label font-bold">Password</label>
                        <input type="password" id="password" class="input" placeholder=" Enter Password" />
                        <p class="text-blue-600 font-bold">Default: admin123</p>

                        <button type="submit" class="btn btn-primary mt-4">Sign In</button>
                    </fieldset>
                </div>
                <div>
                    <div class="flex items-center  mb-6 mx-16">
                        <hr class="flex-grow border-t border-gray-400">
                        <span class="mx-2 text-gray-500 font-semibold">OR</span>
                        <hr class="flex-grow border-t border-gray-400">
                    </div>
                </div>
                <div class="flex flex-col justify-center items-center">
                    <p class="text-cyan-700">Demo Credentials:</p>

                    <p> <span class="font-bold ">Username</span>:admin</p>
                    <p> <span class="font-bold ">Password</span>:admin123</p>
                </div>


            </div>
        </div>

    </form>


    <script src="script.js"></script>
</body>

</html>
